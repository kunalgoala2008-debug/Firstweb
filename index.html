<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>

    <link rel="stylesheet" href="style.css">
</head>

    <style> 
     
 @import url('https://fonts.googleapis.com/css2?family=Martel+Sans:wght@200;300;400;600;700;800;900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
 .main{

    background-image: url("assets/images/bg.jpg");
    height: 80vh;
    position:relative;

    Background-position:center center;
    Background-repeat : no-repeat;
    height:75vh;
    background-size: max(2100px, 100vw);
}

body{
    background-color: black;
}

*{
    margin: 0;
    padding: 0;

}

.main .box{
    width:100%;
    height:75vh;
    background-color: black;
    opacity:0.67;
    position :absolute;
    top:0px;
}

nav{
    display:flex;
    align-items:center;
   width:80vw;
   margin:auto;
   justify-content:space-between;
   height:62px;
   position:relative;
   top:15px;
}
 .imgg{

width:140px;
position:relative;
z-index: 10;
}
nav button{

    position:relative;
    z-index:10;
}

.hero{

    height: calc(100% -62px);
    display:flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color:white;
    position:relative;
    top:160px;
    z-index:10;
    font-family:"Martel Sans", sans-serif;
  
  font-style: normal;
  padding: 0 25px;
  text-align:center;
}

.hero> :nth-child(1) {
font-weight: 900;
  font-size: 56px;
  text-align: center;
}

.hero> :nth-child(2){
margin-top: -15px;
    font-weight:1000;
    font-size: 24px;
    text-align: center;
}

.hero> :nth-child(3){
     margin-top: 20px;
    font-weight:400;
    font-size:20px;
    text-align: center;
}

.seperation{
height:7px;
background-color: rgb(63, 63, 63);
opacity: 0.6;
}

.btn{
    padding:3px 8px;
    font-weight:bold;
    
    
}

.btnredsn{
    background-color: red;
}

.btnred{
    background-color: red;
    padding: 12px 14px;
    font-size:21px;
    border-radius:5px;

}

.main input{
    padding: 16px 14px;
    font-size:15px;
    border-radius:5px;
    width:331px;

    background-color: rgb(23,23,23,0.7);  
    border:1px solid rgba(255, 255, 255, 0.203);  
    
    
}

.herobutton{
    display: flex;
    justify-content: center;
    gap:3px;
    align-items: center;
    


}

.logoo{
    height:13px;
    width:13px;
}
    </style>

<body>
    <div class="main">

        <nav>

            <span> <img src="assets/images/logo.svg" class="imgg" alt=""></span>
            <div>
                <button class="btn"><img src="assets/images/trans.svg" class="logoo"  alt="">English </button>
                <button class="btn btnredsn">Sign In</button>
            </div>
        </nav>
        <div class="box">
 
        </div>
        <div class="hero">
            <span>Unlimited movies, shows, and more</span>
            <span>Starts at ₹149. Cancel at any time</span>
            <span>Ready to watch? Enter your email to create or restart your membership.</span>
            <div class="herobutton">
                <input type="text" placeholder="Email address">
                <button class="btn btnred"> Get Started  ></button>
            </div>
        </div>
      
    </div>
      <div class="seperation"></div>

</body>

</html>
